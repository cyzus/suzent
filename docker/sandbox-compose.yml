# Suzent Sandbox Image Builder
# =============================
# Builds the custom sandbox image with Python + Node.js + common packages.
#
# Build: docker compose -f docker/sandbox-compose.yml build
#
# Then set in config/default.yaml:
#   sandbox_image: suzent-sandbox

services:
  sandbox:
    image: suzent-sandbox:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
