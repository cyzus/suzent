<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Suzent</title>
    <script>
      (function () {
        var t = localStorage.getItem('suzent-theme');
        var isDark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');

        var scheme = localStorage.getItem('suzent-scheme') || 'warm';
        document.documentElement.dataset.scheme = scheme;

        var colors = {
          warm:  { light: '#FFE666', dark: '#FF6600' },
          cold:  { light: '#7DD3FC', dark: '#38BDF8' },
          green: { light: '#86EFAC', dark: '#4ADE80' },
        };
        var c = colors[scheme] || colors.warm;
        document.documentElement.style.setProperty('--brutal-yellow', isDark ? c.dark : c.light);
      })();
    </script>
  </head>
  <body class="h-full bg-neutral-50 text-neutral-800">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
