name: Build Desktop

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: suzent-windows-x86_64.exe
            binary: src-tauri/target/release/suzent.exe
          - os: macos-latest
            asset: suzent-macos-aarch64
            binary: src-tauri/target/release/suzent
          - os: macos-13
            asset: suzent-macos-x86_64
            binary: src-tauri/target/release/suzent
          - os: ubuntu-22.04
            asset: suzent-linux-x86_64
            binary: src-tauri/target/release/suzent

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Tauri JS deps
        run: cd src-tauri && npm ci

      - name: Build
        run: cd src-tauri && npm run build:dist

      - name: Upload binary to Release
        if: github.event_name == 'release'
        shell: bash
        run: |
          cp "${{ matrix.binary }}" "${{ matrix.asset }}"
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ matrix.asset }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
