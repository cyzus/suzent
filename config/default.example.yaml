# Example configuration for Suzent
# Place user overrides here. The application will load
# config/default.example.yaml first (if present), falling back to
# config/default.yaml if the example file is absent.

# MODEL_OPTIONS:
#   # By default, Suzent uses the internal provider configuration for model defaults.
#   # Uncomment and list models here ONLY to override the default discovery process
#   # and forcefully limit the available models.
#   # - "anthropic/claude-3-opus-20240229"
#   # - "openai/gpt-4o"


# Tools to enable by default (these names must match Tool class names)
DEFAULT_TOOLS:
  - "WebSearchTool"
  - "WebpageTool"
  - "PlanningTool"
  - "ReadFileTool"
  - "WriteFileTool"
  - "EditFileTool"
  - "GlobTool"
  - "GrepTool"
  - "BashTool"
  - "SpeakTool"
  - "SpawnSubagentTool"

MCP_URLS:
  # Simple format: just the URL
  "HF Space MCP": "https://evalstate-hf-mcp-server.hf.space/mcp"
  # Nested format with headers
  # "Authenticated MCP":
  #   url: "https://api.example.com/mcp"
  #   headers:
  #     Authorization: "Bearer your-api-key"
  #     X-Custom-Header: "custom-value"

MCP_STDIO_PARAMS:
  mcp-arxiv:
    command: "uv"
    args:
      - "tool"
      - "run"
      - "arxiv-mcp-server"
      - "--storage-path"
      - "./data/papers"

INSTRUCTIONS: ""
ADDITIONAL_AUTHORIZED_IMPORTS: []

# Text-to-Speech
TTS_MODEL: "gemini/gemini-2.5-flash-preview-tts"
TTS_VOICE: "Zephyr"

# Image Generation
IMAGE_GENERATION_MODEL: "gemini/gemini-3.1-flash-image-preview"

# Memory System (requires PostgreSQL with pgvector - see .env for connection)
MEMORY_ENABLED: true
EMBEDDING_MODEL: gemini/gemini-embedding-001
EMBEDDING_DIMENSION: 3072
# Declarative cron job presets — created/updated idempotently on startup.
# Fields: name, cron_expr, prompt, delivery_mode (announce|silent), model_override, enabled, requires
# `requires`: name of a CONFIG field that must be truthy for this job to be active.
# Add new presets here without touching any Python code.
CRON_PRESETS:
  - name: wiki-ingest-daily
    cron_expr: "0 2 * * *"
    prompt: "Run the ingest skill for daily memory logs. Follow /mnt/skills/notebook/ingest.md exactly."
    delivery_mode: announce
  - name: wiki-lint-weekly
    cron_expr: "0 3 * * 0"
    prompt: "Run the lint skill. Follow /mnt/skills/notebook/lint.md exactly."
    delivery_mode: announce
  # Example — add your own presets:
  # - name: daily-summary
  #   cron_expr: "0 20 * * *"
  #   prompt: "Summarize what was accomplished today and write it to /shared/memory/summaries/."
  #   delivery_mode: announce

USER_ID: "default-user"
# Extraction model for LLM-based fact extraction (leave empty for heuristic-based)
EXTRACTION_MODEL: "gemini/gemini-2.5-flash" # "" to disable

# Sandbox (requires Docker Desktop)
SANDBOX_ENABLED: false
# Docker image to use. Options:
#   python:3.11-slim       — default, Python + bash only
#   suzent-sandbox         — recommended: Node.js, curl, numpy, pandas, etc.
#                            Build with: docker compose -f docker/sandbox-compose.yml build
SANDBOX_IMAGE: python:3.11-slim
# Network mode: "bridge" (internet access) or "none" (fully isolated)
SANDBOX_NETWORK: bridge
# Stop idle containers after N minutes of inactivity
SANDBOX_IDLE_TIMEOUT_MINUTES: 30
# Command to run once after container creation (login shell, so PATH includes ~/.local/bin)
# Useful for pre-installing packages: "pip install pandas requests"
SANDBOX_SETUP_COMMAND: ""
# Extra environment variables injected into the container (secrets are blocked automatically)
SANDBOX_ENV: {}
SANDBOX_VOLUMES:
  - ".suzent/notebook:/mnt/notebook"
