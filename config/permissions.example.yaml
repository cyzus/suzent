# Dedicated, tool-agnostic permission policies
# Optional: create config/permissions.yaml to define tool-specific permissions.
# This example file is intentionally non-overriding.

PERMISSIONS:
  # Permission mode new chats start in. One of:
  #   default (ask before edits) | accept_edits | auto | plan | strict_readonly
  # Omitted here so this example stays non-overriding; set it in permissions.yaml.
  # default_permission_mode: default
  tools: {}
